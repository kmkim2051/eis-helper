# 로컬 개발 — docker-compose.yml의 MariaDB(호스트 13306) 사용
spring:
  datasource:
    url: jdbc:mariadb://localhost:13306/eis
    username: eis
    password: local-eis
  jpa:
    # 로컬은 엔티티 변경을 스키마에 자동 반영 (운영은 validate)
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
